<style>/* SähköTepi Oy — design system */
.skip-link {
  position: absolute; left: 8px; top: -40px;
  background: #0A4A8A; color: #fff; padding: 8px 14px;
  font: 500 13px/1.2 system-ui, sans-serif; z-index: 9999;
  text-decoration: none; border-radius: 0 0 6px 6px;
  transition: top 0.15s;
}
.skip-link:focus { top: 0; }


:root {
  --bg: #EAF2FA;
  --fg: #062C52;
  --muted: rgba(6, 44, 82, 0.78);
  --line: rgba(6, 44, 82, 0.14);
  --line-strong: rgba(6, 44, 82, 0.28);
  --surface: #DCE8F3;
  --surface-2: #C9DBEB;
  --accent: #1FA8DD; /* SähköTepi cyan */
  --accent-ink: #FFFFFF;
  --brand-deep: #0A4A8A; /* SähköTepi deep blue */
  --brand-mid: #1F7DC0;
  --radius: 0px;
  --font-display: 'Manrope', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-body: 'Manrope', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
}

[data-theme="dark"] {
  --bg: #061A2E;
  --fg: #E9F3FA;
  --muted: rgba(233, 243, 250, 0.58);
  --line: rgba(233, 243, 250, 0.14);
  --line-strong: rgba(233, 243, 250, 0.28);
  --surface: #0C2744;
  --surface-2: #113256;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.005em;
}

a { color: inherit; text-decoration: none; }

.mono {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}

.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 48px;
}
@media (max-width: 720px) {
  .container { padding: 0 20px; }
}

/* ── STICKY HEADER WRAPPER ─────────────────────────────────────── */
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 60;
}
body {
  padding-top: calc(36px + 72px); /* topbar + nav heights */
}
@media (max-width: 900px) {
  body { padding-top: calc(36px + 72px); }
}

/* ── TOP BAR (utility: phone / whatsapp / email) ───────────────── */
.topbar {
  background: var(--brand-deep);
  color: #E9F3FA;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.01em;
  text-transform: none;
}
.topbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 36px;
  gap: 24px;
  padding: 0 48px;
}
.topbar-left { display: flex; gap: 24px; align-items: center; }
.topbar-right { display: flex; gap: 0; align-items: stretch; height: 100%; }
.topbar-right a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 100%;
  padding: 0 16px;
  color: #E9F3FA;
  transition: background 0.2s;
}
.topbar-left a { color: #E9F3FA; }
.topbar-right a:hover { background: rgba(255,255,255,0.08); }
.topbar a.whatsapp { background: #25D366; color: #062C52 !important; font-weight: 600; }
.topbar a.whatsapp:hover { background: #1EBE5A; }
.topbar a.call { background: var(--accent); color: #FFF !important; font-weight: 600; }
.topbar a.call:hover { background: #1690C0; }
.topbar-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #25D366; animation: pulse 1.8s ease-in-out infinite; }
@media (max-width: 900px) {
  .topbar .hide-sm { display: none; }
  .topbar-inner { justify-content: flex-end; padding: 0 20px; }
}

/* ── NAVIGATION ─────────────────────────────────────────────────── */
.nav {
  position: relative;
  z-index: 50;
  background: color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  gap: 32px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 44px;
}
.logo img {
  height: 100%;
  width: auto;
  display: block;
}
[data-theme="dark"] .logo img {
  filter: brightness(1.2) contrast(1.05);
}
.logo-mark {
  width: 26px;
  height: 26px;
  display: inline-block;
  color: var(--accent);
  flex-shrink: 0;
}
.logo-mark svg { display: block; width: 100%; height: 100%; }
.logo {
  font-weight: 700;
  letter-spacing: 0.01em;
}
.logo .logo-sahko { color: var(--brand-deep, #0A4A8A); }
.logo .logo-tepi { color: var(--accent); }
[data-theme="dark"] .logo .logo-sahko { color: var(--fg); }
.nav-links {
  display: flex;
  gap: 36px;
  font-size: 14px;
}
.nav-links a {
  color: var(--fg);
  opacity: 0.7;
  transition: opacity 0.2s;
}
.nav-links a:hover { opacity: 1; }
.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 11px 18px;
  background: var(--fg);
  color: var(--bg);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.005em;
  transition: transform 0.2s, background 0.2s;
}
.nav-cta:hover { transform: translateY(-1px); }

/* Burger button — small icon-button visible on small screens, hidden on desktop */
.nav-burger {
  width: 40px; height: 40px;
  display: none;
  place-items: center;
  background: transparent;
  border: 1px solid var(--line);
  cursor: pointer;
  position: relative;
  padding: 0;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
.nav-burger:hover { background: var(--surface); }
.nav-burger span {
  display: block;
  position: absolute;
  width: 16px; height: 1.5px;
  background: var(--fg);
  transition: transform 0.3s ease, opacity 0.2s ease, top 0.3s ease;
  left: 50%;
  margin-left: -8px;
}
.nav-burger span:nth-child(1) { top: 13px; }
.nav-burger span:nth-child(2) { top: 19px; }
.nav-burger span:nth-child(3) { top: 25px; }
.nav-burger.is-open span:nth-child(1) { top: 19px; transform: rotate(45deg); }
.nav-burger.is-open span:nth-child(2) { opacity: 0; }
.nav-burger.is-open span:nth-child(3) { top: 19px; transform: rotate(-45deg); }

/* Burger drawer */
.nav-drawer {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 40;
}
.nav-drawer.is-open { max-height: 700px; }
.nav-drawer-inner { padding: 16px 0 32px; }
.nav-drawer-links {
  display: flex;
  flex-direction: column;
}
.nav-drawer-links a {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 16px;
  padding: 22px 0;
  border-top: 1px solid var(--line);
  color: var(--fg);
  text-decoration: none;
  font-family: var(--font-display);
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.4s ease, transform 0.4s ease, color 0.2s;
}
.nav-drawer.is-open .nav-drawer-links a {
  opacity: 1;
  transform: translateY(0);
}
.nav-drawer-links a:hover { color: var(--accent); }
.nav-drawer-num {
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 500;
}
.nav-drawer-label { min-width: 0; }
.nav-drawer-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 24px;
  padding: 16px 24px;
  background: var(--accent);
  color: var(--bg);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  text-decoration: none;
  letter-spacing: -0.005em;
  transition: transform 0.2s, background 0.2s;
}
.nav-drawer-cta:hover { transform: translateY(-1px); }

@media (max-width: 1040px) {
  .nav-links { display: none; }
  .nav-burger { display: grid; }
  .nav-cta { display: none; }
}

/* Floating bottom-right CTA */
.floating-cta {
  position: fixed;
  right: clamp(16px, 3vw, 32px);
  bottom: clamp(16px, 3vw, 32px);
  z-index: 60;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 22px;
  background: var(--accent);
  color: var(--bg);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.005em;
  text-decoration: none;
  box-shadow:
    0 12px 28px rgba(6, 44, 82, 0.22),
    0 4px 10px rgba(6, 44, 82, 0.14);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
}
.floating-cta:hover {
  transform: translateY(-2px);
  box-shadow:
    0 18px 36px rgba(6, 44, 82, 0.28),
    0 6px 14px rgba(6, 44, 82, 0.18);
}
.floating-cta-label { white-space: nowrap; }
@media (max-width: 480px) {
  .floating-cta { padding: 14px 18px; font-size: 13px; }
}

/* ── HERO ──────────────────────────────────────────────────────── */
.hero {
  padding: 72px 0 120px;
  border-bottom: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 14px;
  color: var(--muted);
  margin-bottom: 48px;
}
.hero-eyebrow::before {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--line-strong);
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(48px, 9vw, 132px);
  line-height: 0.98;
  letter-spacing: -0.04em;
  font-weight: 700;
  margin: 0 0 48px;
  max-width: 14ch;
}
.hero h1 .accent {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
  position: relative;
  display: inline-block;
  z-index: 1;
}
.hero h1 .accent::after {
  content: '';
  position: absolute;
  left: -0.05em;
  right: -0.05em;
  bottom: 0.06em;
  height: 0.08em;
  background: var(--accent);
  z-index: -1;
  opacity: 0.25;
}
.hero h1 .accent > span {
  position: relative;
  z-index: 1;
}

/* ── HERO LAYOUT (text + portrait) ─────────────────────────────── */
.hero-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
  gap: 64px;
  align-items: start;
}
@media (max-width: 900px) {
  .hero-layout { grid-template-columns: 1fr; gap: 40px; }
}
.hero-text { min-width: 0; }
.hero-text h1 {
  margin-bottom: 40px;
}
.hero-portrait {
  margin: 0;
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  aspect-ratio: 4 / 5;
  overflow: hidden;
  width: 100%;
  max-width: 480px;
  justify-self: end;
}
@media (max-width: 900px) {
  .hero-portrait { justify-self: stretch; max-width: 100%; aspect-ratio: 3 / 4; }
}
.hero-portrait img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.02) saturate(0.95);
}
.hero-portrait-cap {
  position: absolute;
  left: 16px;
  bottom: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: rgba(6, 44, 82, 0.78);
  color: #E9F3FA;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.hero-portrait-cap .pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: #25D366; animation: pulse 1.8s ease-in-out infinite;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 80px;
  align-items: end;
}
.hero-lede {
  font-size: 20px;
  line-height: 1.4;
  max-width: 42ch;
  color: var(--fg);
  letter-spacing: -0.01em;
}
.hero-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 40px;
  border-top: 1px solid var(--line-strong);
  padding-top: 24px;
}
.hero-meta dt {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.hero-meta dd {
  margin: 0;
  font-size: 15px;
  font-weight: 500;
}

@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  .hero { padding: 40px 0 72px; }
}

/* ── BUTTONS ───────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 28px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  transition: transform 0.15s, background 0.2s, color 0.2s;
  cursor: pointer;
  border: none;
  font-family: inherit;
}
.btn-primary {
  background: var(--fg);
  color: var(--bg);
}
.btn-primary:hover { transform: translateY(-1px); background: var(--accent); color: var(--accent-ink); }
.btn-ghost {
  background: transparent;
  color: var(--fg);
  border: 1px solid var(--line-strong);
}
.btn-ghost:hover { border-color: var(--fg); background: var(--fg); color: var(--bg); }
.btn-arrow { width: 18px; height: 10px; }

.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* ── SECTION CHROME ────────────────────────────────────────────── */
section { position: relative; }
.section-head {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 40px;
  padding: 96px 0 48px;
  align-items: baseline;
}
.section-num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 5.5vw, 64px);
  line-height: 1.02;
  letter-spacing: -0.025em;
  font-weight: 700;
  margin: 0;
  max-width: 20ch;
}
.section-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--muted);
}

@media (max-width: 720px) {
  .section-head { grid-template-columns: 1fr; gap: 16px; padding: 64px 0 32px; }
}

/* ── SERVICES ──────────────────────────────────────────────────── */
.services {
  border-top: 1px solid var(--line);
}
.service-list {
  border-top: 1px solid var(--line-strong);
}
.service {
  display: grid;
  grid-template-columns: 80px 1.2fr 2fr 1fr 40px;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid var(--line);
  align-items: center;
  cursor: pointer;
  transition: padding 0.3s ease, background 0.3s ease;
  position: relative;
}
.service:hover { padding-left: 16px; padding-right: 16px; background: var(--surface); }
.service-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
}
.service-name {
  font-family: var(--font-display);
  font-size: clamp(22px, 2.4vw, 32px);
  font-weight: 600;
  letter-spacing: -0.02em;
}
.service-desc {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.5;
  max-width: 48ch;
}
.service-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  justify-self: end;
}
.service-arrow {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  display: grid;
  place-items: center;
  transition: background 0.2s, color 0.2s, transform 0.2s;
  justify-self: end;
}
.service:hover .service-arrow {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: var(--accent);
  transform: rotate(-45deg);
}

@media (max-width: 900px) {
  .service { grid-template-columns: 40px 1fr 32px; gap: 16px; padding: 20px 0; }
  .service-desc, .service-tag { display: none; }
}

/* ── NUMBERS STRIP ─────────────────────────────────────────────── */
.stats {
  border-top: 1px solid var(--line);
  padding: 72px 0;
  background: var(--surface);
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.stat .num {
  font-family: var(--font-display);
  font-size: clamp(44px, 6vw, 88px);
  line-height: 1;
  letter-spacing: -0.04em;
  font-weight: 700;
  margin-bottom: 12px;
}
.stat .num .unit { color: var(--muted); font-weight: 400; }
.stat .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  border-top: 1px solid var(--line-strong);
  padding-top: 12px;
}
@media (max-width: 720px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 32px; }
}

/* ── REFERENCES / CASES ────────────────────────────────────────── */
.cases {
  border-top: 1px solid var(--line);
  padding-bottom: 96px;
}
.case-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 24px;
}
.case {
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.case:hover { transform: translateY(-4px); }
.case-img {
  aspect-ratio: 4 / 3;
  background: repeating-linear-gradient(
    45deg,
    var(--surface),
    var(--surface) 6px,
    var(--surface-2) 6px,
    var(--surface-2) 12px
  );
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
}
.case-img::after {
  content: attr(data-caption);
  position: absolute;
  inset: auto 12px 12px 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--bg);
  padding: 4px 8px;
  width: fit-content;
}
.case-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.case-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  letter-spacing: -0.015em;
  margin: 6px 0 2px;
}
.case-sub { font-size: 14px; color: var(--muted); }

.case-1 { grid-column: span 7; }
.case-2 { grid-column: span 5; }
.case-3 { grid-column: span 4; }
.case-4 { grid-column: span 4; }
.case-5 { grid-column: span 4; }
.case-1 .case-img { aspect-ratio: 16 / 10; }
.case-2 .case-img { aspect-ratio: 4 / 3; }

@media (max-width: 900px) {
  .case-1, .case-2, .case-3, .case-4, .case-5 { grid-column: span 12; }
}

/* ── INSTAGRAM CASES VIEW ──────────────────────────────────────── */
.cases-ig .ig-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 20px 24px;
  border: 1px solid var(--line);
  background: var(--surface);
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.cases-ig .ig-handle {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}
.cases-ig .ig-icon {
  width: 44px; height: 44px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, #F58529, #DD2A7B 50%, #515BD4);
  color: #fff;
  flex-shrink: 0;
}
.cases-ig .ig-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.01em;
}
.cases-ig .ig-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 2px;
}
.cases-ig .ig-follow { padding: 12px 18px; font-size: 13px; }

.ig-feed {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}
.ig-post {
  display: grid;
  grid-template-columns: minmax(0, 360px) 1fr;
  gap: 28px;
  padding: 20px;
  border: 1px solid var(--line);
  background: var(--surface);
  text-decoration: none;
  color: inherit;
  transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  align-items: start;
  contain: content;
}
.ig-post:hover { transform: translateY(-2px); border-color: var(--line-strong); background: var(--surface-2); }
.ig-post-img { position: relative; aspect-ratio: 1 / 1; background: var(--surface-2); overflow: hidden; }
.ig-post-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ig-post-badge {
  position: absolute;
  top: 10px; right: 10px;
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: rgba(6, 44, 82, 0.78);
  color: #fff;
}
.ig-post-body { display: flex; flex-direction: column; min-width: 0; height: 100%; }
.ig-post-meta { display: flex; justify-content: space-between; gap: 16px; color: var(--muted); margin-bottom: 12px; flex-wrap: wrap; }
.ig-post-stats { display: inline-flex; gap: 12px; }
.ig-post-caption {
  font-size: 15px;
  line-height: 1.55;
  color: var(--fg);
  margin: 0 0 16px;
  white-space: pre-wrap;
  display: -webkit-box;
  -webkit-line-clamp: 8;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.ig-post-link { margin-top: auto; display: inline-flex; align-items: center; gap: 8px; color: var(--accent); }
@media (max-width: 720px) {
  .ig-post { grid-template-columns: 1fr; gap: 16px; padding: 14px; }
  .ig-post-img { aspect-ratio: 4 / 3; max-height: 340px; }
  .ig-post-caption { -webkit-line-clamp: 12; }
}

/* ── PROCESS ───────────────────────────────────────────────────── */
.process {
  background: var(--brand-deep, #0A4A8A);
  color: #E9F3FA;
  border-top: 1px solid var(--line);
}
[data-theme="dark"] .process { background: #03101E; }
.process .section-num,
.process .section-title em { color: rgba(244, 241, 234, 0.5); }
.process-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid rgba(244, 241, 234, 0.2);
  margin-top: 48px;
}
.step {
  padding: 40px 24px 56px;
  border-right: 1px solid rgba(244, 241, 234, 0.2);
  position: relative;
}
.step:last-child { border-right: none; }
.step-num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: rgba(244, 241, 234, 0.5);
  margin-bottom: 60px;
}
.step-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.step-desc {
  color: rgba(244, 241, 234, 0.65);
  font-size: 14px;
  line-height: 1.5;
}
@media (max-width: 900px) {
  .process-steps { grid-template-columns: 1fr 1fr; }
  .step { border-right: 1px solid rgba(244, 241, 234, 0.2); border-bottom: 1px solid rgba(244, 241, 234, 0.2); }
  .step:nth-child(2n) { border-right: none; }
}
@media (max-width: 520px) {
  .process-steps { grid-template-columns: 1fr; }
  .step { border-right: none; }
}

/* ── QUOTE / CTA ───────────────────────────────────────────────── */
.cta {
  padding: 120px 0;
  border-top: 1px solid var(--line);
  position: relative;
}
.cta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: end;
}
.cta h2 {
  font-family: var(--font-display);
  font-size: clamp(40px, 6vw, 88px);
  line-height: 0.98;
  letter-spacing: -0.03em;
  font-weight: 700;
  margin: 0;
}
.cta h2 em {
  font-style: italic;
  font-weight: 400;
}
.cta-form {
  display: grid;
  gap: 14px;
  padding: 32px;
  background: var(--surface);
  border: 1px solid var(--line);
}
.field { display: grid; gap: 6px; }
.field label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.field input, .field select, .field textarea {
  background: var(--bg);
  border: 1px solid var(--line);
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  color: var(--fg);
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--fg);
}
.field textarea { resize: vertical; min-height: 96px; }

.service-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.chip {
  font-size: 12px;
  padding: 6px 12px;
  border: 1px solid var(--line-strong);
  cursor: pointer;
  background: var(--bg);
  color: var(--fg);
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  font-family: inherit;
}
.chip:hover { border-color: var(--fg); }
.chip.active {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}

@media (max-width: 900px) {
  .cta-grid { grid-template-columns: 1fr; gap: 40px; }
  .cta { padding: 72px 0; }
}

/* ── FOOTER ────────────────────────────────────────────────────── */
.footer {
  border-top: 1px solid var(--line);
  padding: 64px 0 32px;
  background: var(--surface);
}
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 40px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--line-strong);
}
.footer h3 {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin: 0 0 16px;
}
.footer ul { list-style: none; margin: 0; padding: 0; }
.footer ul li { margin-bottom: 10px; font-size: 14px; }
.footer .brand-big {
  font-family: var(--font-display);
  font-size: clamp(48px, 7vw, 96px);
  letter-spacing: -0.04em;
  line-height: 0.95;
  font-weight: 700;
  margin: 0 0 24px;
}
.footer-bar {
  display: flex;
  justify-content: space-between;
  padding-top: 24px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
}
@media (max-width: 900px) {
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 520px) {
  .footer-grid { grid-template-columns: 1fr; }
  .footer-bar { flex-direction: column; gap: 8px; }
}

/* ── MARQUEE ───────────────────────────────────────────────────── */
.marquee {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 20px 0;
  overflow: hidden;
  white-space: nowrap;
}
.marquee-track {
  display: inline-flex;
  gap: 48px;
  animation: marquee 38s linear infinite;
  font-family: var(--font-display);
  font-size: clamp(24px, 3vw, 36px);
  letter-spacing: -0.02em;
  font-weight: 600;
}
.marquee-track span { display: inline-flex; align-items: center; gap: 48px; }
.marquee-track .dot {
  width: 10px; height: 10px; background: var(--accent); display: inline-block;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ── ACCENT VARIANTS ───────────────────────────────────────────── */
[data-accent="cyan"]  { --accent: #1FA8DD; --accent-ink: #FFFFFF; }
[data-accent="deep"]  { --accent: #0A4A8A; --accent-ink: #FFFFFF; }
[data-accent="mid"]   { --accent: #1F7DC0; --accent-ink: #FFFFFF; }
[data-accent="ice"]   { --accent: #9FD9F0; --accent-ink: #0A4A8A; }

/* ── UTIL ──────────────────────────────────────────────────────── */
.reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.8s, transform 0.8s; }
.reveal.in { opacity: 1; transform: none; }

.hero-visual {
  margin-top: 64px;
  aspect-ratio: 16 / 7;
  width: 100%;
  background: repeating-linear-gradient(
    90deg,
    var(--surface),
    var(--surface) 10px,
    var(--surface-2) 10px,
    var(--surface-2) 20px
  );
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line);
}
.hero-visual::before {
  content: 'PLACEHOLDER / HERO — asentaja työmaalla, pystykuva tai horisontaalinen';
  position: absolute;
  left: 20px; top: 20px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--bg);
  padding: 6px 10px;
}
.hero-visual-label {
  position: absolute;
  right: 20px;
  bottom: 20px;
  display: flex;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg);
  background: var(--bg);
  padding: 8px 12px;
  border: 1px solid var(--line-strong);
}
.hero-visual-label .pulse {
  width: 8px; height: 8px; background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.4); }
}
</style>
